# Google Cloud Build configuration for Cloud Run deployment
steps:
  # Build the Docker image (for Cloud Run)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/dsmi-api:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/dsmi-api:latest"
      - "-f"
      - "Dockerfile.cloudrun"
      - "."

  # Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/dsmi-api:$SHORT_SHA"

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gke-deploy"
    args:
      - "run"
      - "--filename=."
      - "--image=gcr.io/$PROJECT_ID/dsmi-api:$SHORT_SHA"
      - "--location=us-central1"
      - "--output=/workspace/output"

images:
  - "gcr.io/$PROJECT_ID/dsmi-api:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/dsmi-api:latest"

options:
  machineType: "N1_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
  
timeout: "3600s"
